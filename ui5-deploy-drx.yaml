# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "3.1"
metadata:
  name: ca.gc.agr.i2pcheckinreport
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: DRX
          url: https://drxpas01.agr.gc.ca:44322/
          client: '100'
        app:
          name: ZQMM_EQ_BARCODE
          description: Equipment Barcode Prototype
          package: ZQMM_EQ_AUDIT
          transport: DRXK902262
        exclude:
          - /test/
        credentials:
          username: env:XYZ_USER
          password: env:XYZ_PASSWORD
