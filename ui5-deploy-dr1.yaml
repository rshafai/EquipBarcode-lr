# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "3.1"
metadata:
  name: ca.gc.agr.i2pcheckinreport
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: DR1_025
          url: https://dr1pas01.agr.gc.ca:44318/
          client: '025'
        app:
          name: ZQMM_EQ_BARCODE
          description: Equipment Barcode Prototype
          package: ZQMM_EQ_AUDIT
          transport: DR1K910531
        exclude:
          - /test/
        credentials:
          username: env:XYZ_USER
          password: env:XYZ_PASSWORD
